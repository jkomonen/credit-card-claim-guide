<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 454" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0%" stop-color="#0b73ff"/>
      <stop offset="100%" stop-color="#0066d6"/>
    </linearGradient>
    <filter id="f1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="720" height="454" rx="28" fill="url(#g1)"/>

  <!-- chip -->
  <rect x="44" y="56" width="64" height="48" rx="6" fill="#ffdca3" opacity="0.95" />

  <!-- brand -->
  <text x="44" y="140" fill="#fff" font-family="Inter, Arial, Helvetica, sans-serif" font-size="40" font-weight="700">Rogers</text>

  <!-- product line -->
  <text x="44" y="190" fill="#e6f0ff" font-family="Inter, Arial, Helvetica, sans-serif" font-size="18">World Elite Mastercard</text>

  <!-- subtle pattern -->
  <g opacity="0.06">
    <rect x="0" y="300" width="720" height="30" fill="#fff" />
  </g>

  <!-- chip shadow -->
  <g filter="url(#f1)">
    <rect x="44" y="56" width="64" height="48" rx="6" fill="#000" opacity="0" />
  </g>

  <!-- last digits -->
  <text x="520" y="340" fill="#fff" font-family="Inter, Arial, Helvetica, sans-serif" font-size="22" font-weight="600">•••• 1234</text>
</svg>
